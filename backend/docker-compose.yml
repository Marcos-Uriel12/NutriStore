version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutristore-postgres
    environment:
      POSTGRES_USER: nutristore
      POSTGRES_PASSWORD: nutristore
      POSTGRES_DB: nutristore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutristore -d nutristore"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nutristore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
